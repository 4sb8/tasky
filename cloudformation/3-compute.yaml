# =============================================================================
# WizTT - Stack 3: Compute
# =============================================================================
# Description:
#   Deploys all EC2 instances for the demo environment:
#     - MongoDB EC2 (intentionally outdated OS + MongoDB version)
#     - Kubernetes Master Node (self-managed kubeadm)
#     - Kubernetes Worker Node (self-managed kubeadm)
#
# Deployment Order: 3 of 5
# Depends On:      Stack 1 (VPC & Networking), Stack 2 (Security & IAM)
# Exports To:      Stack 4 (Observability), Stack 5 (Application)
#
# Resources Created:
#   - MongoDB EC2 instance (public subnet, outdated OS, outdated MongoDB)
#   - MongoDB backup S3 bucket (public read + listing - intentional weakness)
#   - AWS Secrets Manager secrets (MongoDB URI components, JWT secret key)
#   - K8s Master EC2 instance (private subnet, kubeadm bootstrapped)
#   - K8s Worker EC2 instance (private subnet, kubeadm bootstrapped)
#   - SSM Parameters for K8s join token exchange between master and worker
#   - CloudWatch Log Groups for K8s Master and Worker (created here to avoid
#     race condition with Stack 4 - instances create log groups on boot
#     before Stack 4 can create them)
#
# Intentional Security Weaknesses (required by Wiz exercise):
#   - MongoDB EC2: Amazon Linux 2 with updates DISABLED (1+ year old OS)
#   - MongoDB: Version 4.4 installed
#   - MongoDB EC2: SSH exposed to 0.0.0.0/0 (via SG in Stack 2)
#   - MongoDB EC2: ec2:* IAM permissions (via role in Stack 2)
#   - S3 backup bucket: Public read + public listing enabled
#   - K8s: cluster-admin ClusterRoleBinding (applied via app CI/CD pipeline)
#
# Bootstrap Architecture:
#   The K8s cluster bootstrap uses a coordinated sequence:
#   1. Master node initializes with kubeadm, stores join command in SSM
#   2. Worker node polls SSM Parameter Store until join command is available
#   3. Worker executes join command to register with master
#   This avoids hardcoding IPs or requiring manual intervention.
#
# CI/CD Notes:
#   - K8s version pinned via parameter for reproducible deployments
#   - UserData scripts log to /var/log/ for post-deployment debugging
#
# Last Updated:    2026-03-13
# Version:         2.0.0
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  WizTT Stack 3/5 - Compute.
  Deploys MongoDB EC2 instance (intentionally outdated), Kubernetes Master
  and Worker nodes (self-managed kubeadm with Calico CNI), S3 backup bucket,
  AWS Secrets Manager secrets, and K8s CloudWatch log groups for the WizTT
  environment.

# =============================================================================
# METADATA
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment Configuration"
        Parameters:
          - EnvironmentName
          - ProjectName
      - Label:
          default: "MongoDB Configuration"
        Parameters:
          - MongoDBInstanceType
          - MongoDBAMI
          - MongoDBVersion
          - MongoDBDatabaseName
      - Label:
          default: "Kubernetes Configuration"
        Parameters:
          - K8sMasterInstanceType
          - K8sWorkerInstanceType
          - K8sAMI
          - KubernetesVersion
          - CalicoVersion
          - PodNetworkCidr
      - Label:
          default: "CloudWatch Configuration"
        Parameters:
          - LogRetentionDays
      - Label:
          default: "Application Configuration"
        Parameters:
          - DomainName
      - Label:
          default: "S3 Backup Configuration"
        Parameters:
          - BackupBucketName

    ParameterLabels:
      EnvironmentName:
        default: "Environment Name"
      ProjectName:
        default: "Project Name"
      MongoDBInstanceType:
        default: "MongoDB Instance Type"
      MongoDBAMI:
        default: "MongoDB Instance AMI (must be 1+ year old)"
      MongoDBVersion:
        default: "MongoDB Version (must be 1+ year old)"
      MongoDBDatabaseName:
        default: "MongoDB Database Name"
      K8sMasterInstanceType:
        default: "K8s Master Instance Type"
      K8sWorkerInstanceType:
        default: "K8s Worker Instance Type"
      K8sAMI:
        default: "K8s Nodes AMI (latest Amazon Linux 2023)"
      KubernetesVersion:
        default: "Kubernetes Version"
      PodNetworkCidr:
        default: "Kubernetes Pod Network CIDR (Calico)"
      LogRetentionDays:
        default: "CloudWatch Log Retention (Days)"
      DomainName:
        default: "Application Domain Name"
      BackupBucketName:
        default: "S3 Backup Bucket Name"
      CalicoVersion:
        default: "Calico CNI Version"

# =============================================================================
# PARAMETERS
# =============================================================================
Parameters:

  # ---------------------------------------------------------------------------
  # Environment Configuration
  # ---------------------------------------------------------------------------
  EnvironmentName:
    Type: String
    Default: demo
    AllowedValues:
      - demo
      - dev
      - staging
      - prod
    Description: >
      Must match the EnvironmentName used in Stack 1 and Stack 2.
      Used to import cross-stack references and name resources consistently.

  ProjectName:
    Type: String
    Default: WizTT
    Description: Project name for resource tagging.

  # ---------------------------------------------------------------------------
  # MongoDB Configuration
  # ---------------------------------------------------------------------------
  MongoDBInstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: >
      EC2 instance type for MongoDB server.

  MongoDBAMI:
    Type: AWS::EC2::Image::Id
    Default: ami-0c2ab3b8efb09f272
    Description: >
      INTENTIONAL WEAKNESS: AMI ID for MongoDB EC2 instance.
      Must be an Amazon Linux 2 AMI that is 1+ year old.
      Default: Amazon Linux 2 ami-0c2ab3b8efb09f272 (us-west-2, 2022 vintage).
      OS updates are DISABLED in UserData to preserve the outdated state.

  MongoDBVersion:
    Type: String
    Default: "4.4"
    AllowedValues:
      - "4.4"
      - "5.0"
    Description: >
      INTENTIONAL WEAKNESS: MongoDB version to install.
      MongoDB 4.4 was released July 2020.

  MongoDBDatabaseName:
    Type: String
    Default: go-mongodb
    Description: >
      MongoDB database name. MUST be "go-mongodb" to match the hardcoded
      database name in the Tasky application (database.go:
      client.Database("go-mongodb")). Do not change this value.

  # ---------------------------------------------------------------------------
  # Kubernetes Configuration
  # ---------------------------------------------------------------------------
  K8sMasterInstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.medium
      - t3.large
    Description: >
      EC2 instance type for K8s Master node.
      t3.medium is the minimum recommended for kubeadm as
      control plane components (API server, etcd, scheduler,
      controller-manager) require at least 2 vCPU and 2GB RAM.

  K8sWorkerInstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
    Description: >
      EC2 instance type for K8s Worker node.

  K8sAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: >
      AMI ID for K8s Master and Worker nodes.
      Uses SSM Parameter Store to resolve to the latest Amazon Linux 2023 AMI.

  KubernetesVersion:
    Type: String
    Default: "1.34"
    AllowedValues:
      - "1.34"
      - "1.35"
    Description: >
      Kubernetes version to install via kubeadm.

  PodNetworkCidr:
    Type: String
    Default: "192.168.0.0/16"
    Description: >
      CIDR for the Kubernetes pod network managed by Calico CNI.
      This value is passed to kubeadm init --pod-network-cidr and must
      match the Calico ConfigMap configuration applied post-init.

  CalicoVersion:
    Type: String
    Default: "v3.31.4"
    Description: >
      Calico CNI version to install on K8s nodes.
      Latest stable v3.31.4 as of March 2026.
      Compatible with Kubernetes 1.34 and 1.35.

  # ---------------------------------------------------------------------------
  # CloudWatch Configuration
  # ---------------------------------------------------------------------------
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 7
      - 14
      - 30
      - 60
      - 90
    Description: >
      Retention period for K8s CloudWatch Log Groups.
      Must match LogRetentionDays in Stack 4 for consistency.

  # ---------------------------------------------------------------------------
  # Application Configuration
  # ---------------------------------------------------------------------------
  DomainName:
    Type: String
    Default: wizdemo.ca
    Description: >
      Root domain name. Used to construct the full MongoDB internal DNS name
      stored in Secrets Manager: mongodb.internal.{DomainName}
      Must match the Route 53 hosted zone created in Stack 4.

  # ---------------------------------------------------------------------------
  # S3 Backup Configuration
  # ---------------------------------------------------------------------------
  BackupBucketName:
    Type: String
    Default: demo-mongodb-backups-390403859369
    Description: >
      S3 bucket name for MongoDB backups.

# =============================================================================
# RESOURCES
# =============================================================================
Resources:

  # ===========================================================================
  # SECTION 3.0: CLOUDWATCH LOG GROUPS
  # ===========================================================================
  # K8s Master and Worker log groups are created here rather than in Stack 4
  # to avoid a race condition: the K8s instances (launched in this stack)
  # create these log groups automatically on boot via the CloudWatch agent.
  # If Stack 4 tried to create them, it would fail with AlreadyExistsException.
  # This follows the same pattern as VPC Flow Logs in Stack 1.
  # MongoDB log group remains in Stack 4 as MongoDB does not auto-create it.
  # ===========================================================================

  # K8s Master Node logs
  # Receives: bootstrap logs, kubeadm-init logs, system messages
  K8sMasterLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: "/aws/ec2/k8s-master"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-k8s-master-logs"
        - Key: Purpose
          Value: "K8s-Control-Plane-Logs"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # K8s Worker Node logs
  # Receives: bootstrap logs, kubeadm-join logs, system messages
  K8sWorkerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: "/aws/ec2/k8s-worker"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-k8s-worker-logs"
        - Key: Purpose
          Value: "K8s-Worker-Node-Logs"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # ===========================================================================
  # SECTION 3.1: S3 BACKUP BUCKET
  # ===========================================================================
  # INTENTIONAL SECURITY WEAKNESSES:
  #   1. Public read access - anyone can read MongoDB backup files
  #   2. Public listing - anyone can enumerate all backup files
  #   3. No encryption at rest - backup files stored in plaintext
  #   4. No versioning - overwritten backups cannot be recovered
  # ===========================================================================
  MongoDBBackupBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Ref BackupBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Suspended
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldBackups
            Status: Enabled
            ExpirationInDays: 30
            Prefix: "backups/"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-mongodb-backups"
        - Key: Purpose
          Value: "MongoDB-Backup-Storage"
        - Key: SecurityWeakness
          Value: "Public-Read-List-No-Encryption"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  MongoDBBackupBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MongoDBBackupBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadBackups
            Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
            Resource: !Sub "${MongoDBBackupBucket.Arn}/backups/*"
          - Sid: PublicListBucket
            Effect: Allow
            Principal: "*"
            Action:
              - s3:ListBucket
            Resource: !GetAtt MongoDBBackupBucket.Arn
          - Sid: MongoDBBackupWrite
            Effect: Allow
            Principal:
              AWS: !ImportValue
                Fn::Sub: "${EnvironmentName}-MongoDBInstanceRoleArn"
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt MongoDBBackupBucket.Arn
              - !Sub "${MongoDBBackupBucket.Arn}/*"

  # CloudTrail logs bucket - private, encrypted
  CloudTrailLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "${EnvironmentName}-cloudtrail-logs-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
            ExpirationInDays: 90
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-cloudtrail-logs"
        - Key: Purpose
          Value: "CloudTrail-Audit-Logs"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  CloudTrailLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${CloudTrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"
          - Sid: AWSConfigBucketPermissionsCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
          - Sid: AWSConfigBucketDelivery
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${CloudTrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/Config/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # ===========================================================================
  # SECTION 3.2: AWS SECRETS MANAGER
  # ===========================================================================
  # Stores sensitive configuration values for the Tasky application.
  # These secrets are synced into K8s via External Secrets Operator (ESO)
  # and injected into the Tasky pod as environment variables.
  #
  # MongoDBURISecret stores URI components as flat key-value pairs.
  # ESO assembles the full URI string at runtime using its template feature.
  # This avoids the CloudFormation limitation of not being able to reference
  # another secret's generated value within the same stack.
  # ===========================================================================

  MongoAdminCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "/${EnvironmentName}/mongodb/admin-credentials"
      Description: "Credentials for MongoDB admin user mongoadmin - WizTT exercise"
      GenerateSecretString:
        SecretStringTemplate: '{"username":"mongoadmin"}'
        GenerateStringKey: "password"
        ExcludePunctuation: true

  TaskyMongoCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "/${EnvironmentName}/tasky/mongodb-credentials"
      Description: "Tasky MongoDB app user credentials"
      GenerateSecretString:
        SecretStringTemplate: '{"username":"taskyadmin"}'
        GenerateStringKey: "password"
        ExcludePunctuation: true

  # ---------------------------------------------------------------------------
  # MongoDB URI components secret
  # ---------------------------------------------------------------------------
  # Stores the static components of the MongoDB connection URI as flat
  # key-value pairs. The password is intentionally excluded here — it is
  # generated separately in TaskyMongoCredentialsSecret.
  #
  # ESO assembles the full URI in the ExternalSecret template:
  #   mongodb://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}?authSource=admin
  #
  # ESO pulls:
  #   - username, host, port, database from this secret (dataFrom extract)
  #   - password from /${EnvironmentName}/tasky/mongodb-credentials (dataFrom extract)
  # ---------------------------------------------------------------------------
  MongoDBURISecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "/${EnvironmentName}/tasky/mongodb-uri"
      Description: >
        MongoDB URI components for Tasky. ESO assembles these into the
        full MONGODB_URI connection string at runtime via template interpolation.
      SecretString: !Sub |
        {
          "username": "taskyadmin",
          "host": "mongodb.internal.${DomainName}",
          "port": "27017",
          "database": "${MongoDBDatabaseName}"
        }
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-mongodb-uri"
        - Key: Purpose
          Value: "Tasky-MongoDB-Connection"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  JWTSecretKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "/${EnvironmentName}/tasky/secret-key"
      Description: "JWT secret key for Tasky token signing. Injected as SECRET_KEY env var into the Tasky K8s pod via ESO."
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-jwt-secret-key"
        - Key: Purpose
          Value: "Tasky-JWT-Authentication"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # ===========================================================================
  # SECTION 3.2b: SSM PARAMETER STORE - MONGODB CONFIG FILES
  # ===========================================================================
  MongoDBRepoFileParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/mongodb/config/repo-file"
      Type: String
      Value: |
        [mongodb-org-4.4]
        name=MongoDB Repository
        baseurl=https://repo.mongodb.org/yum/amazon/2/mongodb-org/4.4/x86_64/
        gpgcheck=1
        enabled=1
        gpgkey=https://www.mongodb.org/static/pgp/server-4.4.asc
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  MongoDBConfParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/mongodb/config/mongod-conf"
      Type: String
      Value: |
        # mongod.conf - WizTT MongoDB Configuration
        storage:
          dbPath: /var/lib/mongo
          journal:
            enabled: true
          engine: wiredTiger

        systemLog:
          destination: file
          logAppend: true
          path: /var/log/mongodb/mongod.log

        net:
          bindIp: 0.0.0.0
          port: 27017

        processManagement:
          fork: false
          pidFilePath: /var/run/mongodb/mongod.pid
          timeZoneInfo: /usr/share/zoneinfo

        security:
          authorization: enabled
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  MongoDBYumExcludeParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/mongodb/config/yum-exclude"
      Type: String
      Value: "exclude=mongodb-org,mongodb-org-server,mongodb-org-shell,mongodb-org-mongos,mongodb-org-tools"
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  K8sRepoFileParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/k8s/config/kubernetes-repo"
      Type: String
      Description: "Kubernetes yum repository configuration file"
      Value: !Sub |
        [kubernetes]
        name=Kubernetes
        baseurl=https://pkgs.k8s.io/core:/stable:/v${KubernetesVersion}/rpm/
        enabled=1
        gpgcheck=1
        gpgkey=https://pkgs.k8s.io/core:/stable:/v${KubernetesVersion}/rpm/repodata/repomd.xml.key
        exclude=kubelet kubeadm kubectl cri-tools kubernetes-cni
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  MongoDBPrivateIPParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/mongodb/private-ip"
      Type: String
      Value: !GetAtt MongoDBInstance.PrivateIp
      Description: "MongoDB EC2 private IP for Route 53 DNS record in Stack 4"
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  CalicoInstallationParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/k8s/config/calico-installation"
      Type: String
      Description: "Calico CNI Installation manifest for K8s cluster"
      Value: |
        apiVersion: operator.tigera.io/v1
        kind: Installation
        metadata:
          name: default
        spec:
          calicoNetwork:
            bgp: Disabled
            ipPools:
            - name: default-ipv4-ippool
              blockSize: 26
              cidr: POD_CIDR_PLACEHOLDER
              encapsulation: VXLAN
              natOutgoing: Enabled
              nodeSelector: all()
        ---
        apiVersion: operator.tigera.io/v1
        kind: APIServer
        metadata:
          name: default
        spec: {}
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  K8sMasterPrivateIPParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/k8s/master-private-ip"
      Type: String
      Value: !GetAtt K8sMasterInstance.PrivateIp
      Description: "K8s Master private IP for worker node join and admin kubectl access"
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  K8sWorkerPrivateIPParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/k8s/worker-private-ip"
      Type: String
      Value: !GetAtt K8sWorkerInstance.PrivateIp
      Description: "K8s Worker private IP for ALB target registration reference"
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  # ===========================================================================
  # SECTION 3.2c: CLOUDWATCH AGENT CONFIGURATIONS VIA SSM
  # ===========================================================================

  K8sMasterCWAgentConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/k8s-master/config/cloudwatch-agent"
      Type: String
      Description: "CloudWatch agent config for K8s Master node"
      Value: |
        {
          "agent": {
            "metrics_collection_interval": 60,
            "logfile": "/opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log"
          },
          "logs": {
            "logs_collected": {
              "files": {
                "collect_list": [
                  {
                    "file_path": "/var/log/k8s-master-bootstrap.log",
                    "log_group_name": "/aws/ec2/k8s-master",
                    "log_stream_name": "{instance_id}/bootstrap",
                    "timezone": "UTC"
                  },
                  {
                    "file_path": "/var/log/kubeadm-init.log",
                    "log_group_name": "/aws/ec2/k8s-master",
                    "log_stream_name": "{instance_id}/kubeadm-init",
                    "timezone": "UTC"
                  },
                  {
                    "file_path": "/var/log/messages",
                    "log_group_name": "/aws/ec2/k8s-master",
                    "log_stream_name": "{instance_id}/messages",
                    "timezone": "UTC"
                  }
                ]
              }
            }
          },
          "metrics": {
            "namespace": "WizTT/K8sMaster",
            "metrics_collected": {
              "cpu": {
                "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
                "metrics_collection_interval": 60
              },
              "mem": {
                "measurement": ["mem_used_percent"],
                "metrics_collection_interval": 60
              },
              "disk": {
                "measurement": ["disk_used_percent"],
                "resources": ["/"],
                "metrics_collection_interval": 60
              }
            }
          }
        }
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref EnvironmentName
        ManagedBy: CloudFormation

  K8sWorkerCWAgentConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/k8s-worker/config/cloudwatch-agent"
      Type: String
      Description: "CloudWatch agent config for K8s Worker node"
      Value: |
        {
          "agent": {
            "metrics_collection_interval": 60,
            "logfile": "/opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log"
          },
          "logs": {
            "logs_collected": {
              "files": {
                "collect_list": [
                  {
                    "file_path": "/var/log/k8s-worker-bootstrap.log",
                    "log_group_name": "/aws/ec2/k8s-worker",
                    "log_stream_name": "{instance_id}/bootstrap",
                    "timezone": "UTC"
                  },
                  {
                    "file_path": "/var/log/kubeadm-join.log",
                    "log_group_name": "/aws/ec2/k8s-worker",
                    "log_stream_name": "{instance_id}/kubeadm-join",
                    "timezone": "UTC"
                  },
                  {
                    "file_path": "/var/log/messages",
