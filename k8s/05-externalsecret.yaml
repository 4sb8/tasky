# =============================================================================
# WizTT - K8s Manifest 05: ExternalSecret
# =============================================================================
# File:            k8s/05-externalsecret.yaml
# Description:
#   Defines the ExternalSecret resource that instructs ESO to:
#     1. Read /wiztt/tasky/mongodb-uri from AWS Secrets Manager
#     2. Read /wiztt/tasky/secret-key from AWS Secrets Manager
#     3. Create/sync K8s Secret 'tasky-secrets' in the tasky namespace
#     4. Refresh every hour (picks up any secret rotation)
#
#   The resulting K8s Secret 'tasky-secrets' contains:
#     MONGODB_URI: mongodb://taskyadmin:<pass>@mongodb.internal.wizdemo.ca:27017/go-mongodb?authSource=admin
#     SECRET_KEY:  <jwt-secret-string>
#
#   These values are injected into the Tasky pod as environment variables
#   via the Deployment manifest (06-deployment.yaml), satisfying the
#   exercise requirement: "Access to MongoDB must be configured via an
#   environment variable configured in Kubernetes."
#
# Security Note:
#   K8s Secrets in self-managed kubeadm clusters are stored as base64
#   in etcd WITHOUT encryption at rest by default. This means the
#   MongoDB credentials are recoverable from etcd if an attacker gains
#   access to the master node — a detectable finding for Wiz.
#   etcd encryption at rest requires additional kubeadm configuration.
#
# Wiz Finding Expected:
#   - K8s Secrets not encrypted at rest in etcd
#   - Sensitive credentials accessible via etcd without encryption
#
# Deployed By:     App CI/CD Pipeline (CodeBuild K8s deploy stage)
# Depends On:      04-clustersecretstore.yaml, ESO installed
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tasky-external-secret
  namespace: tasky
  labels:
    app.kubernetes.io/name: tasky
    app.kubernetes.io/part-of: wiztt
    environment: wiztt
    managed-by: kubectl
  annotations:
    description: >
      Syncs MongoDB URI and JWT secret key from AWS Secrets Manager
      into K8s Secret 'tasky-secrets'. Refreshes every hour.
      Secret paths: /wiztt/tasky/mongodb-uri, /wiztt/tasky/secret-key
spec:
  # Refresh interval - ESO re-reads from Secrets Manager every hour
  # Allows secret rotation to propagate without pod restart
  refreshInterval: 1h

  # Reference the ClusterSecretStore defined in 04-clustersecretstore.yaml
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  # Target K8s Secret configuration
  target:
    name: tasky-secrets
    namespace: tasky
    # Owner: ExternalSecret manages lifecycle of the K8s Secret
    # If this ExternalSecret is deleted, tasky-secrets is also deleted
    creationPolicy: Owner
    # Merge: preserve any manually added keys in the Secret
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: tasky
          app.kubernetes.io/part-of: wiztt
        annotations:
          description: "Tasky app secrets synced from AWS Secrets Manager by ESO"

  # Secret key mappings
  # Each entry maps one Secrets Manager secret to one K8s Secret key
  data:
    # MongoDB connection URI
    # AWS Secrets Manager path: /wiztt/tasky/mongodb-uri
    # K8s Secret key: MONGODB_URI
    # Consumed by: database.go os.Getenv("MONGODB_URI")
    - secretKey: MONGODB_URI
      remoteRef:
        key: /wiztt/tasky/mongodb-uri
        # No property specified = use the full secret string value
        # The secret value IS the full URI string

    # JWT signing secret key
    # AWS Secrets Manager path: /wiztt/tasky/secret-key
    # K8s Secret key: SECRET_KEY
    # Consumed by: auth.go os.Getenv("SECRET_KEY")
    #              userController.go os.Getenv("SECRET_KEY")
    - secretKey: SECRET_KEY
      remoteRef:
        key: /wiztt/tasky/secret-key
