# =============================================================================
# WizTT - K8s Manifest 02: ServiceAccount
# =============================================================================
# File:            k8s/02-serviceaccount.yaml
# Description:
#   Creates the ServiceAccount used by the Tasky application pod.
#   This ServiceAccount is the subject of the intentionally overpermissive
#   ClusterRoleBinding defined in 03-clusterrolebinding.yaml.
#
#   automountServiceAccountToken: true is required here because the
#   ClusterRoleBinding grants cluster-admin — the token being mounted
#   into the pod is itself the intentional weakness (a compromised pod
#   could use this token to perform any K8s API operation cluster-wide).
#
# Intentional Security Weakness:
#   - ServiceAccount is bound to cluster-admin ClusterRole (see 03-)
#   - Token is auto-mounted into pod filesystem at:
#     /var/run/secrets/kubernetes.io/serviceaccount/token
#   - A compromised Tasky container could use this token to:
#     - Read all secrets in all namespaces
#     - Create/delete pods, deployments, services
#     - Escalate privileges further
#
# Wiz Finding Expected:
#   - K8s workload with cluster-admin privileges
#   - Service account token mounted with excessive permissions
#
# Deployed By:     App CI/CD Pipeline (CodeBuild K8s deploy stage)
# Depends On:      01-namespace.yaml
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tasky-sa
  namespace: tasky
  labels:
    app.kubernetes.io/name: tasky
    app.kubernetes.io/part-of: wiztt
    environment: wiztt
    managed-by: kubectl
  annotations:
    description: >
      ServiceAccount for Tasky application pod.
      INTENTIONAL WEAKNESS: Bound to cluster-admin via ClusterRoleBinding.
      This grants the pod unrestricted access to the K8s API.
# automountServiceAccountToken defaults to true - explicitly set
# to make the intentional weakness visible in code review
automountServiceAccountToken: true
