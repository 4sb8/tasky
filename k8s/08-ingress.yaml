# =============================================================================
# WizTT - K8s Manifest 08: Ingress
# =============================================================================
# File:            k8s/08-ingress.yaml
# Description:
#   Defines the K8s Ingress resource for the Tasky application.
#   Uses AWS Load Balancer Controller to CREATE and MANAGE the ALB.
#
#   The AWS LB Controller owns the full ALB lifecycle:
#     - Creates ALB on first deploy
#     - Manages listeners, target groups, and routing rules
#     - Deletes ALB when Ingress is deleted (before stack teardown)
#
#   ACM certificate and WAF ARNs are injected at deploy time by the
#   K8s deploy CodeBuild stage from CloudFormation stack outputs.
#
#   Route 53 ALIAS record points to the LB controller ALB DNS name.
#   The DNS record is managed by Stack 4 and updated by the pipeline.
#
#   TEARDOWN NOTE: Delete this Ingress resource BEFORE deleting stacks
#   to allow the LB controller to clean up the ALB and its security groups.
#   kubectl delete ingress tasky-ingress -n tasky
#
# Deployed By:     App CI/CD Pipeline (CodeBuild K8s deploy stage)
# Depends On:      07-service.yaml, AWS LB Controller installed
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasky-ingress
  namespace: tasky
  labels:
    app: tasky
    app.kubernetes.io/name: tasky
    app.kubernetes.io/part-of: wiztt
    environment: demo
    managed-by: kubectl
  annotations:
    description: "K8s Ingress for Tasky application - ALB managed by LB Controller"

    # -------------------------------------------------------------------------
    # AWS Load Balancer Controller Annotations
    # -------------------------------------------------------------------------

    # Use the AWS ALB (Application Load Balancer)
    kubernetes.io/ingress.class: alb

    # internet-facing: ALB is publicly accessible
    alb.ingress.kubernetes.io/scheme: internet-facing

    # instance target type: routes to node IP + NodePort
    # Using 'instance' for self-managed K8s (no VPC CNI / no EKS)
    alb.ingress.kubernetes.io/target-type: instance

    # ACM certificate ARN injected at deploy time by K8s deploy CodeBuild
    # stage from Stack 4 CloudFormation outputs (ACMCertificateArn)
    alb.ingress.kubernetes.io/certificate-arn: "REPLACE_WITH_CERT_ARN"

    # HTTPS listener on port 443
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'

    # Modern TLS policy
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06

    # Redirect HTTP to HTTPS at ALB level
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # WAF Web ACL ARN injected at deploy time by K8s deploy CodeBuild
    # stage from Stack 4 CloudFormation outputs (WAFWebACLArn)
    alb.ingress.kubernetes.io/wafv2-acl-arn: "REPLACE_WITH_WAF_ARN"

    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-port: "30080"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200-399"

    # Security group for the ALB - use the CF-managed ALB security group
    # from Stack 2 to keep security rules in IaC
    alb.ingress.kubernetes.io/security-groups: "REPLACE_WITH_ALB_SG_ID"

    # Tags applied to ALB resources created by LB Controller
    alb.ingress.kubernetes.io/tags: >-
      Environment=demo,
      Project=WizTT,
      ManagedBy=kubectl

spec:
  # Default backend for unmatched requests
  defaultBackend:
    service:
      name: tasky-service
      port:
        number: 80

  rules:
    # Route tasky.wizdemo.ca traffic to Tasky service
    - host: tasky.wizdemo.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tasky-service
                port:
                  number: 80
