# =============================================================================
# WizTT - K8s Manifest 04: ClusterSecretStore
# =============================================================================
# File:            k8s/04-clustersecretstore.yaml
# Description:
#   Configures the External Secrets Operator (ESO) ClusterSecretStore
#   that connects to AWS Secrets Manager.
#
#   ClusterSecretStore (vs SecretStore) is cluster-scoped, meaning it
#   can be referenced by ExternalSecret resources in ANY namespace.
#   For this single-namespace deployment, either would work, but
#   ClusterSecretStore is used for operational flexibility.
#
#   Authentication uses the EC2 instance IAM role (Pod Identity / IRSA
#   is not available in self-managed K8s without additional setup).
#   The K8s Worker node IAM role (Stack 2) grants:
#     secretsmanager:GetSecretValue on /demo/tasky/* paths
#
#   Prerequisites (installed by app CI/CD pipeline before this manifest):
#     helm repo add external-secrets https://charts.external-secrets.io
#     helm install external-secrets external-secrets/external-secrets \
#       --namespace external-secrets --create-namespace
#
# Deployed By:     App CI/CD Pipeline (CodeBuild K8s deploy stage)
# Depends On:      ESO Helm chart installed, K8s Worker IAM role (Stack 2)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: wiztt
    environment: demo
    managed-by: kubectl
  annotations:
    description: >
      ESO ClusterSecretStore connecting to AWS Secrets Manager in us-west-2.
      Uses EC2 instance IAM role for authentication (no IRSA in self-managed K8s).
      Syncs /demo/tasky/mongodb-uri and /demo/tasky/secret-key into
      K8s Secret 'tasky-secrets' in the tasky namespace.
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      # Authentication via EC2 instance profile (K8s Worker IAM role)
      # The worker node role has secretsmanager:GetSecretValue scoped
      # to arn:aws:secretsmanager:*:*:secret:/demo/tasky/*
      # No auth block needed - ESO automatically uses the instance profile
